apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy-tf09
  labels:
    app: web-tf09

spec:
  replicas: 3

  selector:
    matchLabels:
      app: web-tf09

  template:
    metadata:
      labels:
        app: web-tf09
    spec:
      containers:
      - name: nginx-container
        image: nginx:latest
        ports:
        - containerPort: 80